services:
  db:
    image: pgvector/pgvector:pg16
    container_name: company-ai-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: company_ai_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d company_ai_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
