spring:
  application:
    name: assistant-api
  datasource:
    url: jdbc:postgresql://localhost:5432/company_ai_assistant
    username: app_user
    password: app_password
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-this-must-be-at-least-32-bytes-long!}
    access-ttl-minutes: 15
    refresh-ttl-days: 7